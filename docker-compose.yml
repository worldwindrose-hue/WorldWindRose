version: "3.9"

services:
  rosa:
    build: .
    image: rosa-os:v5
    container_name: rosa_os
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./memory:/app/memory
      - ./.env:/app/.env:ro
      - ./config:/app/config:ro
      - ./experimental:/app/experimental
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - rosa_net

  # Optional: nginx reverse proxy with SSL
  # nginx:
  #   image: nginx:alpine
  #   container_name: rosa_nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
  #     - ./memory/ssl:/etc/ssl/rosa:ro
  #   depends_on:
  #     - rosa
  #   networks:
  #     - rosa_net

networks:
  rosa_net:
    driver: bridge

volumes:
  memory:
