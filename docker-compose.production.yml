version: '3.8'

services:
  rosa:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: rosa_os
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - rosa_memory:/app/memory
      - ./.env:/app/.env:ro
    environment:
      - ROSA_MODE=cloud
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
      - rosa_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: rosa_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      rosa:
        condition: service_healthy
    networks:
      - rosa_net

  certbot:
    image: certbot/certbot
    container_name: rosa_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      /bin/sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done'
    profiles:
      - ssl

volumes:
  rosa_memory:
    driver: local
  certbot_certs:
    driver: local
  certbot_www:
    driver: local

networks:
  rosa_net:
    driver: bridge
